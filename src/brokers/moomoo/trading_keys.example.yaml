# Moomoo Trading Configuration Example
# Copy this file to trading_keys.yaml and update with your settings

moomoo:
  # Connection settings
  host: "127.0.0.1"          # Moomoo OpenD host address
  port: 11111                # Moomoo OpenD port
  
  # Trading settings
  trade_password: "123456"   # Paper trading password (default)
  market: "US"               # Trading market: US, HK, CN
  paper_trading: true        # Use paper trading account
  
  # Connection settings
  timeout: 30                # Connection timeout in seconds
  retry_count: 3             # Number of retry attempts
  
  # Optional trading preferences
  max_position_size: 0.2     # Maximum 20% of portfolio per position
  order_timeout: 60          # Order timeout in seconds
  price_tolerance: 0.01      # Price tolerance for market orders (1%)
  
  # Risk management
  daily_loss_limit: 0.05     # Stop trading if daily loss exceeds 5%
  max_orders_per_day: 50     # Maximum orders per day
  
  # Logging
  enable_detailed_logging: true
  log_all_api_calls: false
# AI Hedge Fund - Simulation Trading Configuration
# This configuration ensures safe paper trading only

# Moomoo Connection Settings
moomoo:
  host: "127.0.0.1"
  port: 11111
  paper_trading: true  # ALWAYS true for safety
  market: "US"
  
  # Safety Settings
  safety:
    force_paper_trading: true
    max_position_size: 1000  # Maximum shares per position
    max_order_value: 10000   # Maximum USD value per order
    require_confirmation: true
    
  # Trading Settings
  trading:
    auto_execute: false      # Require manual confirmation
    sync_positions: true     # Sync positions before trading
    order_type: "MARKET"     # Use market orders
    
# AI Analysis Settings
ai_analysis:
  tickers:
    - "AAPL"
    - "MSFT" 
    - "GOOGL"
    - "TSLA"
    - "NVDA"
  
  # Agent Configuration
  agents:
    enable_all: true
    show_reasoning: true
    
  # Risk Management
  risk:
    max_portfolio_risk: 0.02  # 2% max risk per trade
    position_sizing: "kelly"   # Kelly criterion for position sizing
    stop_loss: 0.05           # 5% stop loss
    
# Logging and Results
logging:
  level: "INFO"
  save_decisions: true
  save_execution_log: true
  results_directory: "results"
  
# Simulation Settings
simulation:
  session_name: "ai_hedge_fund_simulation"
  save_results: true
  analyze_performance: true
  
  # Performance Metrics
  metrics:
    - "total_return"
    - "sharpe_ratio" 
    - "max_drawdown"
    - "win_rate"
    - "execution_rate"

# Safety Warnings
warnings:
  paper_trading_only: "This configuration is for PAPER TRADING only. Real money trading is disabled."
  confirmation_required: "All trades require manual confirmation unless auto_execute is explicitly enabled."
  moomoo_opend_required: "Moomoo OpenD must be running and logged into a paper trading account."